name: Sync Content to D1

on:
  push:
    branches: [main]
    paths:
      - 'content/tools/**'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Generate SQL from Markdown
        run: node scripts/sync-to-d1.js --file /tmp/sync.sql

      - name: Execute SQL on D1
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          command: d1 execute aifindr-db --file=/tmp/sync.sql
