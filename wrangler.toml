name = "aifindr-api"
main = "workers/api.ts"
compatibility_date = "2026-05-07"

# Routes: /api/* 指向此 Worker
routes = [
  { pattern = "aifindr.org/api/*", zone_id = "" }
]

# D1 Database — 从 Cloudflare Dashboard → D1 → 数据库详情页获取 ID
[[d1_databases]]
binding = "DB"
database_name = "aifindr-db"
database_id = ""

# KV Cache（可选）— 不配置时 stats 不会缓存，不影响其他功能
# 创建：npx wrangler kv:namespace create CACHE
# 然后在下方填入返回的 ID
# [[kv_namespaces]]
# binding = "CACHE"
# id = "5f16b45d-3658-4f74-87df-47f53e2ab04d"

# Turnstile Secret
[vars]
TURNSTILE_SECRET = ""
