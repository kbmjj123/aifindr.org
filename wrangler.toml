name = "aifindr-api"
main = "workers/api.ts"
compatibility_date = "2026-05-07"

# Routes: /api/* 指向此 Worker
routes = [
  { pattern = "aifindr.org/api/*", zone_id = "e10e1a0eb9055d9740e7659f03c17035" },
  { pattern = "aifindr.org/sitemap.xml", zone_id = "e10e1a0eb9055d9740e7659f03c17035" }
]

# D1 Database — 从 Cloudflare Dashboard → D1 → 数据库详情页获取 ID
[[d1_databases]]
binding = "DB"
database_name = "aifindr-db"
database_id = "8e365acb-9ac4-4fb4-99c6-cfcaa4ed633d"

# KV Cache — 用于缓存高频查询（stats 等）
[[kv_namespaces]]
binding = "CACHE"
id = "ae4b1dfcbdb145db969dc4a5e0b3e722"

# Turnstile Secret
[vars]
TURNSTILE_SECRET = "0x4AAAAAADLaTZ6nhzkwRkpcqMgkr73-yWc"
GITHUB_CLIENT_ID = "Ov23lioNhw0LD6MXeMFJ"
ADMIN_GITHUB_IDS = ""  # 管理员 GitHub ID，逗号分隔，如 "12345678,87654321"
RESEND_API_KEY = "" # Resend 邮件服务 API Key（从 resend.com/api-keys 获取）
GITHUB_WEBHOOK_SECRET = "" # GitHub Webhook Secret（仓库 Settings → Webhooks → Secret）
LEMONSQUEEZY_WEBHOOK_SECRET = "" # Lemon Squeezy Webhook Secret（Lemon Squeezy → Settings → Webhooks）

# Cron Triggers（Cloudflare Workers Cron Triggers，免费 5 个/账号）
[triggers]
crons = [
  "0 9 * * *",   # Cron 1: 每天 09:00 UTC — 检查超 7 天未审核提交 + 刷新 KV 缓存
  "0 3 * * *",   # Cron 2: 每天 03:00 UTC — 反链失效检查
  "0 8 1 * *",   # Cron 3: 每月 1 日 08:00 UTC — 反链效果月报
  "0 14 * * 1",  # Cron 4: 每周一 14:00 UTC — Newsletter 定时触发
]
